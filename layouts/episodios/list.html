{{- define "main" }}

{{- partial "breadcrumbs.html" . }}

<!-- Cabecera estilo Spotify -->
<div style="display:flex; align-items:center; gap:1.25rem; margin:1rem 0 2rem; padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,0.1);">
  <img src="/images/logo-la-pausa.jpg" alt="La Pausa"
       style="width:90px; height:90px; border-radius:10px; object-fit:cover; flex-shrink:0;" />
  <div>
    <p style="margin:0 0 0.2rem; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; opacity:0.5;">Podcast</p>
    <h1 style="margin:0 0 0.3rem; font-size:1.6rem; line-height:1.2;">La Pausa</h1>
    <p style="margin:0; opacity:0.65; font-size:0.9rem; font-style:italic;">Decidir es fácil, acertar, no tanto.</p>
  </div>
</div>

<!-- Lista de episodios -->
{{- range .Pages.ByDate }}
<a href="{{ .Permalink }}"
   style="display:flex; align-items:center; gap:1rem; padding:0.75rem; border-radius:8px; text-decoration:none; color:inherit; transition:background 0.15s; margin-bottom:0.25rem;"
   onmouseover="this.style.background='rgba(255,255,255,0.06)'"
   onmouseout="this.style.background='transparent'">

  {{- with .Params.listImage }}
  <img src="{{ . }}" alt="{{ $.Title }}"
       style="width:60px; height:60px; border-radius:6px; object-fit:cover; flex-shrink:0;" />
  {{- end }}

  <div style="flex:1; min-width:0;">
    <p style="margin:0; font-weight:600; font-size:0.95rem;">{{ .Title }}</p>
    <p style="margin:0.2rem 0 0; opacity:0.55; font-size:0.78rem;">{{ .Date.Format "2 January 2006" }}</p>
  </div>

  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
       stroke-linejoin="round" style="opacity:0.35; flex-shrink:0;">
    <polyline points="9 18 15 12 9 6"></polyline>
  </svg>

</a>
{{- end }}

{{- end }}
