  [[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/podlapausa"

  [[params.socialIcons]]
    name = "spotify"
    url = "https://creators.spotify.com/pod/show/033mZPECIvONzIm78UYpgo/home"

[menu]
